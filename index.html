<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fox Script Zones</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: #0f0f14;
    color: white;
}

header {
    background: linear-gradient(90deg, #ff6a00, #ff2e63);
    padding: 20px;
    text-align: center;
    font-size: 28px;
    font-weight: bold;
    letter-spacing: 2px;
}

.container {
    padding: 40px;
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
    gap: 20px;
}

.card {
    background: #1b1b26;
    border-radius: 15px;
    padding: 20px;
    box-shadow: 0 0 20px rgba(255, 106, 0, 0.2);
    transition: 0.3s;
}

.card:hover {
    transform: translateY(-5px);
    box-shadow: 0 0 25px rgba(255, 106, 0, 0.5);
}

.card h2 {
    margin: 0 0 10px 0;
    color: #ff6a00;
}

.card p {
    opacity: 0.8;
    font-size: 14px;
}

button {
    margin-top: 15px;
    padding: 8px 15px;
    border: none;
    border-radius: 8px;
    background: #ff6a00;
    color: white;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    background: #ff2e63;
}
footer {
    text-align: center;
    padding: 20px;
    opacity: 0.5;
}
</style>
</head>

<body>

<header>
🦊 FOX SCRIPT ZONES
</header>

    <div class="card">
        <h2>fake speed glitch</h2>
        <p>speed glitch fake para mm2.</p>
        <button onclick="copiar('script2')">Copiar Script</button>
        <textarea id="script2" style="display:none;">
loadstring(game:HttpGet("https://pastefy.app/EIOb90au/raw"))()
        </textarea>
    </div>

</div>

<footer>
© 2026 Fox Script Zones
</footer>

<script>
function copiar(id) {
    var texto = document.getElementById(id);
    texto.style.display = "block";
    texto.select();
    document.execCommand("copy");
    texto.style.display = "none";
    alert("Script copiado 🦊");
}
</script>

</body>
</html>
